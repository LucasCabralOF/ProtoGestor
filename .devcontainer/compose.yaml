services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /home/app
    volumes:
      - ..:/home/app
    command: sleep infinity
    ports:
      - "3001:3001"
    depends_on:
      - db

  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: app
    ports:
      - "5433:5432"
    volumes:
      - pgdata_next_novo:/var/lib/postgresql/data

volumes:
  pgdata_next_novo: